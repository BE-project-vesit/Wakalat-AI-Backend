version: '3.8'

services:
  wakalat-ai:
    build: .
    container_name: wakalat-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    
