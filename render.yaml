services:
  - type: web
    name: wakalat-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python http_main.py
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash
      - key: POSTGRES_URL
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
